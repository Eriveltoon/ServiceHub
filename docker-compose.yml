version: "3.8"

services:
    app:
        build:
            context: .
        container_name: servicehub-app
        working_dir: /var/www
        volumes:
            - .:/var/www
        ports:
            - "8000:8000"
        depends_on:
            - db

    db:
        image: mysql:8.0
        container_name: servicehub-db
        restart: always
        environment:
            MYSQL_DATABASE: servicehub
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"

    node:
        image: node:20
        container_name: servicehub-node
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "5173:5173"
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
