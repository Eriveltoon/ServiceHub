version: "3.8"

services:
    app:
        build:
            context: .
        container_name: servicehub-app
        working_dir: /var/www
        volumes:
            - .:/var/www
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

    queue:
        build:
            context: .
        container_name: servicehub-queue
        working_dir: /var/www
        volumes:
            - .:/var/www
        depends_on:
            db:
                condition: service_healthy
        command: sh -c "php artisan queue:work --sleep=3 --tries=3 --timeout=90"

    node:
        image: node:20
        container_name: servicehub-node
        working_dir: /var/www
        volumes:
            - .:/var/www
        ports:
            - "5173:5173"
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    db:
        image: mysql:8.0
        container_name: servicehub-db
        restart: always
        environment:
            MYSQL_DATABASE: servicehub
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
        volumes:
            - dbdata:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    dbdata:
